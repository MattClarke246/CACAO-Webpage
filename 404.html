<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — CACAO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/jpeg" href="assets/images/cacao-logo.jpeg">
    <link rel="apple-touch-icon" href="assets/images/cacao-logo.jpeg">
    <style>
        .error-hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(170deg, var(--color-bg) 0%, #e8dfcd 100%);
            padding: 20px;
        }
        .error-hero h1 {
            font-size: clamp(4rem, 10vw, 8rem);
            color: var(--color-primary);
            margin-bottom: 0;
            line-height: 1;
        }
        .error-hero h2 {
            color: var(--color-lush);
            margin-bottom: 20px;
        }
        .error-hero p {
            max-width: 500px;
            color: #555;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="error-hero">
        <a href="index.html" style="margin-bottom: 40px;">
            <img src="assets/images/cacao-logo.jpeg" alt="CACAO Logo" style="height: 80px; border-radius: 8px; box-shadow: var(--shadow);">
        </a>
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        <a href="index.html" class="btn btn-accent">Return to Homepage</a>
    </div>
</body>
</html>
